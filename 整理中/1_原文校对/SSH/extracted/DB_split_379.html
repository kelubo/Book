<p class="calibre4">At press time, we have found no modern SSH clients for BeOS. There are a bunch of ancient ones (2000-2002) supporting the old SSH-1 protocol: search <a href="http://www.bebits.com/" shape="rect" class="calibre6">http://www.bebits.com/</a> to find them. </p>
