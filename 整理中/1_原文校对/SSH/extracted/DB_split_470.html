<h2 class="calibre21" id="calibre_pb_627"><span class="calibre22"><a shape="rect" class="calibre7"></a><a id="filepos2898165" class="calibre7"></a>18.5.2 Host Keys </span></h2>
</div>
</div>
</div>
<p class="calibre4"><a shape="rect" class="calibre15"></a><a id="filepos2898313" class="calibre15"></a>Like other SSH implementations, PuTTY records the host keys<a shape="rect" class="calibre15"></a><a id="filepos2898410" class="calibre15"></a> of SSH servers it encounters. They are stored in the Windows registry under the key <code class="calibre35">\HKEY_CURRENT_USER\Software\SimonTatham\PuTTY\SshHostKeys</code>. </p>
