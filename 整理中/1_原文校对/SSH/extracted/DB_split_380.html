<h2 class="calibre21" id="calibre_pb_498"><span class="calibre22"><a shape="rect" class="calibre7"></a><a id="filepos2637485" class="calibre7"></a>13.3.2 Commodore Amiga </span></h2>
</div>
</div>
</div>
<p class="calibre4">At press time, we have found no modern SSH clients for the Amiga. The closest is an Amiga port of OpenSSH (<a href="http://www.chernoff.org/amiga/" shape="rect" class="calibre6">http://www.chernoff.org/amiga/</a>, free). However, it's a port of Version 3.0.2, which is several years out of date. </p>
