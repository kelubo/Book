<h2 class="calibre21" id="calibre_pb_306"><span class="calibre22"><a shape="rect" class="calibre7"></a><a id="filepos1631773" class="calibre7"></a>7.4.8 Forwarding </span></h2>
</div>
</div>
</div>
<p class="calibre4">Port forwarding and X forwarding are covered in <a shape="rect" href="DB_split_281.html#filepos1865367" class="calibre6">Chapter 9</a> and agent forwarding in <a shape="rect" href="DB_split_190.html#filepos1221117" class="calibre6">Chapter 6</a>. We mention them here only for completeness, since forwarding can be controlled in the client configuration file and on the command line. </p>
