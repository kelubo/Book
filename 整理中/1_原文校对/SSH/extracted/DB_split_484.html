<h1 class="calibre1" id="calibre_pb_644"><span class="calibre2"><a shape="rect" class="calibre7"></a>Appendix A. OpenSSH 4.0 New Features </span></h1>
</div>
</div>
</div>
<p class="calibre4">Stop the presses! Just before this book was printed, OpenSSH 4.0 was released by those fine folks at <a href="http://openssh.com/" shape="rect" class="calibre6">openssh.com</a>. While compatible with Version 3.9, it has several important new features that we discuss briefly. (We cover just features, not bug fixes.) </p>
