<h2 class="calibre21" id="calibre_pb_182"><span class="calibre22"><a shape="rect" class="calibre7"></a><a id="filepos716739" class="calibre7"></a>4.5.2 GNU Emacs </span></h2>
</div>
</div>
</div>
<p class="calibre4"><a shape="rect" class="calibre15"></a><a id="filepos716886" class="calibre15"></a>The Emacs variable <code class="calibre35">remote-shell-program</code> contains the path to any desired program for invoking a remote shell. Simply redefine it to be the full path to your <span><em class="italic">ssh</em></span> executable. Also, the <span><em class="italic">rlogin</em></span> package, <em class="italic">rlogin.el</em>, defines a variable <code class="calibre35">rlogin-program</code> you can redefine to use <span><em class="italic">slogin</em></span>. </p>
