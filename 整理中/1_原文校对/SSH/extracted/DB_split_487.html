<h2 class="calibre21" id="calibre_pb_647"><span class="calibre22"><a shape="rect" class="calibre7"></a><a id="filepos2924688" class="calibre7"></a>AddressFamily Keyword </span></h2>
</div>
</div>
</div>
<p class="calibre4">The <code class="calibre35">AddressFamily</code> configuration keyword, previously available to clients only, can now be configured for the SSH server as well. If your server supports both IPv4 and IPv6, this lets you control on which sort of addresses <span><em class="italic">sshd</em></span> will listen. </p>
