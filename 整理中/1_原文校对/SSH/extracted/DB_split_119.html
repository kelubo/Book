<p class="calibre4"><a shape="rect" class="calibre15"></a><a id="filepos603286" class="calibre15"></a>Building and installing OpenSSH follows the familiar pattern for Unix open source software: <span><em class="italic">configure</em></span>, <span><em class="italic">make</em></span>, and <span><em class="italic">make install</em></span>. <a shape="rect" href="DB_split_114.html#filepos592786" class="calibre6">[4.1.6]</a> Read the file <em class="italic">INSTALL</em> in the top-level source directory for full instructions. </p>
