<p class="calibre4"><a shape="rect" class="calibre15"></a><a id="filepos2492472" class="calibre15"></a>
<a shape="rect" class="calibre15"></a><a id="filepos2492511" class="calibre15"></a>SSH clients and servers have debugging built in. When invoked with appropriate options, these programs emit messages<a shape="rect" class="calibre15"></a><a id="filepos2492665" class="calibre15"></a> about their progress and failures. You can use these messages to isolate problems. </p>
