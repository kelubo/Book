<p class="calibre4"><em class="italic">ssh.el</em> (<a href="http://www.splode.com/~friedman/software/emacs-lisp/src/ssh.e" shape="rect" class="calibre6">http://www.splode.com/~friedman/software/emacs-lisp/src/ssh.e</a> l, free) is an Emacs interface for SSH client connections. It does not implement SSH itself, but invokes an external client (e.g., <span><em class="italic">ssh</em></span> from OpenSSH or Tectia) within Emacs. </p>
