<p class="calibre4"><a shape="rect" class="calibre15"></a><a id="filepos2905394" class="calibre15"></a>PuTTY supports SOCKS, an application-layer network proxying system supported by various SSH implementations. <a shape="rect" href="DB_split_228.html#filepos1616907" class="calibre6">[7.4.7]</a> You can enable it in the PuTTY Configuration dialog, under Connection/Proxy. </p>
