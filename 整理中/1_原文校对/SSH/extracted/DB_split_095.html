<h2 class="calibre21" id="calibre_pb_137"><span class="calibre22"><a shape="rect" class="calibre7"></a><a id="filepos535976" class="calibre7"></a>3.9.1 Eavesdropping </span></h2>
</div>
</div>
</div>
<p class="calibre4">An <span><em class="italic">eavesdropper</em></span> is a network snooper who reads network traffic without affecting it in any way. SSH's encryption prevents eavesdropping<a shape="rect" class="calibre15"></a><a id="filepos536326" class="calibre15"></a>
<a shape="rect" class="calibre15"></a><a id="filepos536365" class="calibre15"></a>. The contents of an SSH session, even if intercepted, can't be decrypted by a snooper. </p>
