<h1 class="calibre1" id="calibre_pb_638"><span class="calibre2"><a shape="rect" class="calibre7"></a>Forwarding </span></h1>
</div>
</div>
</div>
<p class="calibre4">Forwarding or tunneling is the use of SSH to secure another network application, covered fully in <a shape="rect" href="DB_split_281.html#filepos1865367" class="calibre6">Chapter 9</a>. Both PuTTY and Plink can set up secure tunnels for this purpose. </p>
