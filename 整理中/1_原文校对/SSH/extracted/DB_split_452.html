<h1 class="calibre1" id="calibre_pb_601"><span class="calibre2"><a shape="rect" class="calibre7"></a>Troubleshooting </span></h1>
</div>

</div>
<p class="calibre4">SecureCRT, like any other SSH client, can run into unexpected difficulties interacting with an SSH server. In this section we cover problems specific to SecureCRT. For more general problems, see also <a shape="rect" href="DB_split_362.html#filepos2490763" class="calibre6">Chapter 12</a>. </p>
