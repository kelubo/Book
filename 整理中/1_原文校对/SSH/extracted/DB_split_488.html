<h2 class="calibre21" id="calibre_pb_648"><span class="calibre22"><a shape="rect" class="calibre7"></a><a id="filepos2925392" class="calibre7"></a>Password and Account Expiration Warnings </span></h2>
</div>
</div>
</div>
<p class="calibre4">If your password or account is going to expire (on operating systems that support expiration), <span><em class="italic">sshd</em></span> will now warn you in advance when you authenticate—for example.: </p><a shape="rect" class="calibre15"></a><span class="calibre27"><div class="calibre3"><tt class="calibre35">    Your password will expire in 6 days<br class="calibre19"/>    Your account will expire in 11 days</tt></div></span></div>
