<p class="calibre4"><a shape="rect" class="calibre15"></a><a id="filepos2927094" class="calibre15"></a>The <code class="calibre35">KbdInteractiveDevices</code> keyword was undocumented in OpenSSH 3.9, but now it's officially supported. It determines the devices that the client will try for keyboard-interactive authentication. </p><a shape="rect" class="calibre15"></a><span class="calibre27"><div class="calibre3"><tt class="calibre35">    KbdInteractiveDevices = pam,skey,bsdauth</tt></div></span></div>
