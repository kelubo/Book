<h1 class="calibre1" id="calibre_pb_617"><span class="calibre2"><a shape="rect" class="calibre7"></a>File Transfer </span></h1>

<p class="calibre4">The PuTTY suite includes two programs for copying your files securely between machines. PSCP is a noninteractive program much like <span><em class="italic">scp</em></span>, and PSFTP is an interactive program inspired by <span><em class="italic">ftp</em></span>. </p>
