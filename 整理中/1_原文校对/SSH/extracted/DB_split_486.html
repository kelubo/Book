<h2 class="calibre21" id="calibre_pb_646"><span class="calibre22"><a shape="rect" class="calibre7"></a><a id="filepos2923908" class="calibre7"></a>Logging of Access Control Violations </span></h2>
</div>
</div>
</div>
<p class="calibre4">When authentication attempts are rejected by user-level access control (<code class="calibre35">AllowUsers</code>, <code class="calibre35">DenyUsers</code>) or group-level access control (<code class="calibre35">AllowGroups</code>, <code class="calibre35">DenyGroups</code>), <span><em class="italic">sshd</em></span> will log an informative message about it. </p>
