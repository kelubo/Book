<h2 class="calibre21" id="calibre_pb_327"><span class="calibre22"><a shape="rect" class="calibre7"></a><a id="filepos1706394" class="calibre7"></a>7.5.9 SSH Protocol Settings </span></h2>
</div>
</div>
</div>
<p class="calibre4">You can downgrade <span><em class="italic">scp</em></span> to use the SSH-1 protocol with the <span><em class="italic">-1</em></span> option, if you are feeling insecure: </p><a shape="rect" class="calibre15"></a><span class="calibre27"><div class="calibre3"><tt class="calibre35">    $ scp -1 myfile server.example.com:</tt></div></span><p class="calibre4">or redundantly specify the SSH-2 protocol, which is the default anyway: </p><a shape="rect" class="calibre15"></a><span class="calibre27"><div class="calibre3"><tt class="calibre35">    # OpenSSH<br class="calibre19"/>    $ scp -2 myfile server.example.com:</tt></div></span></div>
