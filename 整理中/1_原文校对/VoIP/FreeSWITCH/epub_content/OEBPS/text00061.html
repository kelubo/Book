<font color="#0468BB">第7章　SIP协议</font>
</font>
</p>
<p height="1em" width="2em">经过对前面章节的学习，相信读者已经对FreeSWITCH的架构和基本概念了解得差不多了。在继续深入学习之前，我们需要了解SIP。</p>
<p height="1em" width="2em">SIP协议是FreeSWITCH的核心协议，理解SIP协议对理解FreeSWITCH的设计理念和使用方法很有帮助。我们在第1章已经对SIP协议做了简单介绍，并与H.323协议做了简单对比。在本章，笔者会带领大家更深入地了解SIP的基本概念以及协议内容。本章不要求读者有SIP基础，但如果读者有一些HTTP协议的基础知识，对理解本章的内容还是很有帮助的。</p>
