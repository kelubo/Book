<font color="#0468BB">第2章　PSTN、PBX及呼叫中心业务</font>
</font>
</p>
<p height="1em" width="2em">我们在第1章学习了PSTN和VoIP的基本概念和术语，在本章我们接着了解一下传统的电话网及交换设备。这些服务有的是读者已经熟悉的，有的可能没听说过。有一些传统业务在VoIP时代实现起来异常简单，而有一些业务可能已经不需要了。</p>
<p height="1em" width="2em">为了更深入地理解这些业务，在本章我们也对一些基本的概念，如中继线、IP-PBX等加以深入介绍。</p>
<p height="1em" width="2em">另外，考虑到相当一部分读者可能把FreeSWITCH应用到呼叫中心或相关业务中，在本章我们也对呼叫中心业务进行了简单的介绍，并简单讨论一下在FreeSWITCH中的实现思路。</p>
