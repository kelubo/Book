<font color="#0468BB">第8章　媒体</font>
</font>
</p>
<p height="1em" width="2em">通过第7章，我们已经了解了SIP信令，它用于帮助我们建立会话。但我们建立通话的目的是“通话”，即通话的双方要能互相听到对方的声音。通过第3章我们也已经了解到，要通过采样、量化、编码将我们声音的模块量变成数字信号，以便在数字线路上传输，我们把这些数字信号称为媒体（Media）。</p>
<p height="1em" width="2em">本章我们就一起来学习一下媒体的知识，以及FreeSWITCH中的媒体处理机制和协商策略。</p>
