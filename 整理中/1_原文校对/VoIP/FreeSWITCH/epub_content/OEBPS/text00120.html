<p height="1em" width="2em">在前面的章节中，我们讲过一些基本的和比较高级一些的实例，涵盖了大部分常用的功能。但是，FreeSWITCH功能非常多，还有一些常用的功能，如企业通信中常用的电话转接、代接等，我们还没来得及讲。另外，对于一些不常用的功能，以及生产环境中关心的压力测试、安全等话题，我们也将在本章简单介绍，以方便感兴趣的读者进一步研究。</p>
