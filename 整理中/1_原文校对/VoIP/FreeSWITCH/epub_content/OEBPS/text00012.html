<font color="#0468BB">第一部分　基础篇</font>
</font>
</p>
<p height="1em" width="2em">自己动手搭建个人的软交换环境是一件激动人心的事。本篇就带领大家一步一步来完成这件事。当然，在这之前我们首先要一起回顾一下电话交换网络和电话交换技术以及相关的历史，并探讨交换网络的现状和未来；同时，学习一些电信领域的基础知识，熟悉一些基础的电信业务；然后，我们再一起体验FreeSWITCH的安装和配置；在对FreeSWITCH有了直观的印象之后，我们再详细解释FreeSWITCH的设计思想和理念、基本概念和理论、运行和维护的方法，以及重要的协议和模块等。</p>
<p height="1em" width="2em">读完本篇，你可以为成为一名合格的FreeSWITCH维护工程师打好坚实的基础。</p>
