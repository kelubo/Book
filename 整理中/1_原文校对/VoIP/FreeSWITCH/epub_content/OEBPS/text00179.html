<font color="#0468BB">第22章　FreeSWITCH二次开发</font>
</font>
</p>
<p height="1em" width="2em">通过对本书前面章节的学习，我们熟悉了FreeSWITCH的使用方法，熟悉了FreeSWITCH的源代码。现在，该轮到我们自己写代码的时候了。当然，在前面我们也写过代码，但都是使用嵌入式脚本及ESL接口等在FreeSWITCH外部开发的。在本章，我们将以笔者在学习和使用过程中的实际例子为例，讲一下如何修改FreeSWITCH的源代码，如何将自己的成果提交到官方的代码库里，为开源项目做贡献。最后，带领大家从头开始开发一个新的模块，以复习和巩固前面学过的知识，告别“纸上谈兵”，冲到战场的一线，为将来的开发打下坚实的基础。</p>
