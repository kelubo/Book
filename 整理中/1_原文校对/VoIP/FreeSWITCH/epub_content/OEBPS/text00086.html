<font color="#0468BB">10.7　小结</font>
</font>
</p>
<p height="1em" width="2em">本章列举了一些在实战过程中常用的基本技能、调试技巧和实用工具等。这些工具，讲起来都很简单，但在实际使用过程中，需要多多练习才能掌握其要领。熟练使用这些命令和工具，在以后的学习和工作中将能事半功倍。</p>
<p height="1em" width="2em">限于篇幅，本章中提到的部分工具和软件我们没有深入讲解，但在关键的地方，笔者都给出了相关的链接或关键字，有兴趣的读者可以自行查阅相关资料，进行进一步的学习。</p>
<p height="1em" width="2em">另外，本书前面的章节对于各种命令和使用场景都讲得比较详细（因而显得有点啰嗦）。从本章开始，我们就认为读者有一定的理论基础和实践经验了。因此，以后再讲解配置、命令或代码的时候，我们就要简明扼要一些了。</p>
