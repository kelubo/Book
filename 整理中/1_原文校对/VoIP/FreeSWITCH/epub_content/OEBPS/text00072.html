<font color="#0468BB">第9章　SIP模块</font>
</font>
</p>
<p height="1em" width="2em">通过前面的章节我们学习了SIP协议的基础知识，并了解到SIP协议是现代VoIP通信的一个主要协议。事实上，它也是FreeSWITCH支持的一个核心协议。FreeSWITCH中大部分的功能和应用都是基于SIP的。因此，在本章我们就来看一下在FreeSWITCH中是怎么实现和使用SIP的，以及我们如何来配置和使用它。</p>
<p height="1em" width="2em">网络中的NAT无处不在，而SIP通信的成功与否及质量好坏也与NAT息息相关。因此，本章我们也会用一些篇幅介绍NAT。</p>
